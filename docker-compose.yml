services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports: ["8000:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - QDRANT_HOST=qdrant
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-itau_faq}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
    volumes:
      - ${ML_CACHE_ROOT:-/run/media/germano/Novo volume/Linux/ml-cache}/torch:/root/.cache/torch:rw
      - ${ML_CACHE_ROOT:-/run/media/germano/Novo volume/Linux/ml-cache}/huggingface:/root/.cache/huggingface:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./guardrails:/app/guardrails:ro
    depends_on:
      qdrant:
        condition: service_healthy

  ingest:
    image: guardrail-safebank-api:latest
    # --no-sync --frozen: reuse the prebuilt venv (keeps the Docker CPU-only torch);
    # do NOT let `uv run` re-sync to the lock, which would reinstall CUDA torch.
    entrypoint: ["uv", "run", "--no-dev", "--no-sync", "--frozen", "--with", "datasets", "python", "scripts/ingest_itau_faq.py"]
    environment:
      - QDRANT_HOST=qdrant
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./scripts:/app/scripts:ro
      - ./guardrails:/app/guardrails:ro
      - ./config.yaml:/app/config.yaml:ro
      - ${ML_CACHE_ROOT:-/run/media/germano/Novo volume/Linux/ml-cache}/huggingface:/root/.cache/huggingface:rw
    depends_on:
      qdrant:
        condition: service_started
    profiles: ["ingest"]
  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports: ["8501:8501"]
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  qdrant_data:
