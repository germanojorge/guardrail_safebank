services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports: ["8000:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_HOST=qdrant
    volumes:
      - /home/germano/.cache/torch:/root/.cache/torch:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./guardrails:/app/guardrails:ro
    depends_on:
      qdrant:
        condition: service_healthy

  ingest:
    image: guardrail-safebank-api:latest
    entrypoint: ["uv", "run", "--no-dev", "python", "scripts/ingest_banking_kb.py"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_HOST=qdrant
    volumes:
      - ./data:/app/data:ro
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      qdrant:
        condition: service_started
    profiles: ["ingest"]

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports: ["8501:8501"]
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  qdrant_data:
